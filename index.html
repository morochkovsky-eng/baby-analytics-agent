<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Agent</title>
<style>
  /* ── Exact Claude.ai token values ────────────────────────
     bg:          #FAF9F5  (rgb 250,249,245)
     text:        #141413  (rgb 20,20,19)
     text-muted:  #73726C
     user-bubble: #F0EEE6  (rgb 240,238,230 = bg-bg-300)
     input-bg:    #FFFFFF
     sidebar:     same as bg
     border:      rgba(0,0,0,0.1)
     accent:      #D97757  (Anthropic orange-red)
     avatar-dark: #3D3D3A
  ──────────────────────────────────────────────────────── */

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #FAF9F5;
    --text:        #141413;
    --text-muted:  #73726C;
    --text-faint:  #A8A79F;
    --user-bubble: #F0EEE6;
    --input-bg:    #FFFFFF;
    --border:      rgba(20,20,19,0.10);
    --border-med:  rgba(20,20,19,0.16);
    --border-str:  rgba(20,20,19,0.22);
    --accent:      #D97757;
    --accent-dark: #C8663F;
    --avatar-bg:   #3D3D3A;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'anthropicSans', ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  body { display: flex; height: 100vh; overflow: hidden; }

  /* ══════════════════════════════════════════
     SIDEBAR — exactly Claude's left nav
  ══════════════════════════════════════════ */
  .sidebar {
    width: 44px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 0 12px;
    background: var(--bg);
    border-right: 1px solid var(--border);
    gap: 2px;
  }

  .sb-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    flex-shrink: 0;
  }
  .sb-btn:hover { background: rgba(20,20,19,0.07); color: var(--text); }
  .sb-btn svg { width: 16px; height: 16px; }

  .sb-spacer { flex: 1; }

  .sb-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--avatar-bg);
    color: #FAF9F5;
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }

  /* ══════════════════════════════════════════
     MAIN COLUMN
  ══════════════════════════════════════════ */
  .main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* ── Top bar ──────────────────────────── */
  .topbar {
    height: 44px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 8px;
    /* No border — Claude doesn't show one here either */
  }

  .topbar-title {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .topbar-badge {
    font-size: 12px;
    color: var(--text-muted);
    background: rgba(20,20,19,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
  }

  .topbar-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--text-faint);
  }

  .dot-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22C55E;
    box-shadow: 0 0 0 2px rgba(34,197,94,0.18);
  }

  /* ── Message list ─────────────────────── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0 8px;
    display: flex;
    flex-direction: column;
  }

  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(20,20,19,0.12); border-radius: 3px; }

  /* Each turn is full-width, centered content at max-width */
  .turn {
    width: 100%;
    padding: 0 48px;
    margin-bottom: 2px;
  }

  /* User turn — right-aligned bubble */
  .turn.user {
    display: flex;
    justify-content: flex-end;
    padding-right: 48px;
    padding-left: 120px;
    margin-bottom: 16px;
  }

  .user-bubble {
    background: var(--user-bubble);
    border-radius: 18px;
    /* Bottom-right corner is smaller — Claude's signature */
    border-bottom-right-radius: 4px;
    padding: 10px 16px;
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
    max-width: 680px;
    word-break: break-word;
  }

  /* Assistant turn — icon + text */
  .turn.assistant {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    max-width: 780px;
    margin-bottom: 4px;
  }

  .assistant-icon {
    width: 24px; height: 24px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .assistant-content {
    flex: 1;
    min-width: 0;
    font-size: 16px;
    line-height: 24px;
    color: var(--text);
  }

  /* ── Markdown inside assistant ──────── */
  .assistant-content p { margin: 0 0 12px; }
  .assistant-content p:last-child { margin-bottom: 0; }
  .assistant-content strong { font-weight: 600; }
  .assistant-content em { font-style: italic; color: var(--text-muted); }

  .assistant-content h1 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; }
  .assistant-content h2 { font-size: 18px; font-weight: 600; margin: 14px 0 6px; }
  .assistant-content h3 {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-muted);
    margin: 14px 0 6px;
  }

  .assistant-content ul, .assistant-content ol {
    padding-left: 22px; margin: 8px 0;
  }
  .assistant-content li { margin: 5px 0; }

  .assistant-content pre {
    background: rgba(20,20,19,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin: 10px 0;
    overflow-x: auto;
    font-size: 13.5px;
    font-family: ui-monospace, 'SF Mono', 'Fira Code', monospace;
    line-height: 1.55;
    white-space: pre-wrap;
    color: var(--text);
  }

  .assistant-content code {
    font-family: ui-monospace, 'SF Mono', monospace;
    font-size: 13.5px;
    background: rgba(20,20,19,0.07);
    padding: 1px 5px;
    border-radius: 4px;
    color: var(--accent-dark);
  }

  .assistant-content pre code {
    background: none; padding: 0; border-radius: 0; color: inherit;
  }

  /* Tool call pill */
  .tool-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(20,20,19,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 12.5px;
    color: var(--text-muted);
    margin: 6px 0;
  }

  .tool-pill-icon { color: var(--accent); font-size: 13px; }

  .tool-pill code {
    font-family: ui-monospace, monospace;
    font-size: 11.5px;
    background: none; padding: 0; border-radius: 0;
    color: var(--text-faint);
  }

  /* Thinking dots */
  .thinking {
    display: flex; gap: 4px; align-items: center;
    padding: 2px 0;
  }
  .thinking span {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--text-faint);
    animation: tpulse 1.3s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.18s; }
  .thinking span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes tpulse {
    0%,60%,100% { opacity: 0.25; transform: scale(0.8); }
    30% { opacity: 1; transform: scale(1); }
  }

  /* ── Quick pills ──────────────────────── */
  .quick-bar {
    padding: 6px 48px 10px;
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .qbtn {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border-med);
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s, background 0.12s;
    white-space: nowrap;
    line-height: 1.4;
  }

  .qbtn:hover {
    border-color: var(--border-str);
    color: var(--text);
    background: rgba(20,20,19,0.04);
  }

  /* ══════════════════════════════════════════
     INPUT BAR — pixel-perfect Claude replica
  ══════════════════════════════════════════ */
  .input-wrap {
    padding: 6px 24px 12px;
    flex-shrink: 0;
  }

  .input-box {
    background: var(--input-bg);
    border-radius: 20px;
    border: 1px solid rgba(20,20,19,0.14);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    transition: border-color 0.15s, box-shadow 0.15s;
    overflow: hidden;
  }

  .input-box:focus-within {
    border-color: rgba(20,20,19,0.28);
    box-shadow: 0 1px 6px rgba(0,0,0,0.07);
  }

  #input {
    display: block;
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 18px 6px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    line-height: 1.5;
    resize: none;
    min-height: 50px;
    max-height: 160px;
  }

  #input::placeholder { color: var(--text-faint); }

  .input-footer {
    display: flex;
    align-items: center;
    padding: 6px 10px 8px 14px;
    gap: 4px;
  }

  .if-left { display: flex; align-items: center; gap: 3px; }
  .if-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

  .if-icon-btn {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    font-size: 15px;
  }
  .if-icon-btn:hover { background: rgba(20,20,19,0.07); color: var(--text); }
  .if-icon-btn svg { width: 15px; height: 15px; }

  .model-chip {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 8px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .model-chip:hover { background: rgba(20,20,19,0.07); color: var(--text); }
  .model-chip svg { width: 11px; height: 11px; }

  /* Voice waveform icon */
  .voice-btn {
    display: flex; align-items: center; gap: 1.5px;
    padding: 8px 6px;
    border: none; background: transparent; cursor: pointer;
    color: var(--text-muted);
    transition: color 0.12s;
  }
  .voice-btn:hover { color: var(--text); }
  .voice-btn span {
    display: block;
    width: 2.5px; border-radius: 2px;
    background: currentColor;
  }

  /* Send button — dark circle, exactly Claude */
  #send-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--text);
    color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.14s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #2a2a28; transform: scale(1.04); }
  #send-btn:disabled { background: rgba(20,20,19,0.15); cursor: not-allowed; transform: none; }
  #send-btn svg { width: 14px; height: 14px; }

  .disclaimer {
    text-align: center;
    font-size: 12px;
    color: var(--text-faint);
    padding: 4px 0 2px;
  }

  /* ── Password screen ─────────────────────────── */
  .lock-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
  }

  .lock-card {
    width: 360px;
    padding: 36px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    box-shadow: var(--shadow-md);
    display: flex; flex-direction: column; align-items: center; gap: 20px;
  }

  .lock-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2);
  }
  .lock-icon svg { width: 22px; height: 22px; }

  .lock-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    text-align: center;
  }

  .lock-sub {
    font-size: 13px;
    color: var(--text-3);
    text-align: center;
    margin-top: -12px;
  }

  .lock-input-wrap {
    width: 100%;
    position: relative;
  }

  .lock-input {
    width: 100%;
    padding: 10px 40px 10px 14px;
    border: 1px solid var(--border-dark);
    border-radius: 10px;
    background: var(--bg);
    font-size: 15px;
    font-family: var(--font-ui);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    letter-spacing: 0.1em;
  }
  .lock-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(217,119,87,0.12);
  }
  .lock-input.error {
    border-color: #e05252;
    box-shadow: 0 0 0 3px rgba(224,82,82,0.12);
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .lock-eye {
    position: absolute; right: 10px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-3); padding: 4px;
    display: flex; align-items: center; justify-content: center;
  }
  .lock-eye:hover { color: var(--text-2); }
  .lock-eye svg { width: 16px; height: 16px; }

  .lock-btn {
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 15px;
    font-weight: 500;
    font-family: var(--font-ui);
    cursor: pointer;
    transition: background 0.15s;
  }
  .lock-btn:hover { background: var(--accent-hover); }

  .lock-error {
    font-size: 12.5px;
    color: #e05252;
    text-align: center;
    min-height: 16px;
  }
</style>
</head>
<body>

<!-- ── Sidebar ───────────────────────────────────────── -->
<nav class="sidebar">
  <button class="sb-btn" title="New chat">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>

  <button class="sb-btn" title="Search">

  <button class="sb-btn" title="Projects" style="color:var(--text)">

</nav>

<!-- ── Main ──────────────────────────────────────────── -->
<div class="main">

  <!-- Top bar -->
  <div class="topbar">

      Analytics Agent
    </span>

    </div>

  <!-- Messages -->
  <div id="messages"></div>

  <!-- Quick pills -->
  <div class="quick-bar">
    <button class="qbtn" onclick="quickAsk('Покажи общую статистику: сколько лайков и дизлайков, какой процент негатива')">👍 Лайки / дизлайки</button>
    <button class="qbtn" onclick="quickAsk('Сколько токенов потрачено и какова стоимость?')">💰 Токены и стоимость</button>

    <button class="qbtn" onclick="quickAsk('Проанализируй паттерны в дизлайках и предложи конкретные улучшения системного промпта')">✏️ Улучшить промпт</button>

  <!-- Input -->
  <div class="input-wrap">

          <button class="if-icon-btn" title="Context" style="color:#5B8DEF">

            <span style="height:16px"></span>
            <span style="height:10px"></span>

          </button>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>

            </svg>

        </div>
      </div>
    </div>
    <p class="disclaimer">Claude is AI and can make mistakes. Please double-check responses.</p>
  </div>

</div><!-- /main -->

<script>

// ── Password lock ────────────────────────────────────────────────────────
const PASSWORD = 'baby2024';

function unlock() {
  const val = document.getElementById('lock-input').value;
  const inp = document.getElementById('lock-input');
  const err = document.getElementById('lock-error');
  if (val === PASSWORD) {
    document.getElementById('lock-screen').style.display = 'none';
    inp.value = '';
    err.textContent = '';
  } else {
    err.textContent = 'Неверный пароль';
    inp.classList.add('error');
    inp.value = '';
    setTimeout(() => inp.classList.remove('error'), 600);
    inp.focus();
  }
}

function toggleEye() {
  const inp = document.getElementById('lock-input');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    inp.type = 'password';
    icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}

const SUPABASE_URL = 'https://ygllwgdiwhchtvlltsja.supabase.co';

async function executeTool(name, input) {
  if (name !== "query_supabase") return JSON.stringify({ error: "Unknown tool" });
  const { table, params } = input;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Prefer': 'count=exact' }
    });
    if (!res.ok) return JSON.stringify({ error: `HTTP ${res.status}`, body: await res.text() });
    const data = await res.json();
    return JSON.stringify({ data, rows: Array.isArray(data) ? data.length : 0, range: res.headers.get('content-range') });
  } catch(e) {
    return JSON.stringify({ error: e.message });
  }
}

async function runAgent(userMessage, statusEl) {
  chatHistory.push({ role: 'user', content: userMessage });

  const system = `Ты аналитический агент для iOS-приложения "Baby Chat AI" — трекер событий младенцев с AI-ассистентом на базе OpenAI.

БАЗА ДАННЫХ (Supabase):
- responses: ответы AI. Поля: user_message, ai_message, triage_level (L0/L1/L2/none), response_profile (quick/standard/alert), model, tokens_prompt, tokens_completion, cost_usd, session_id, app_version, build
- feedback: оценки ответов. Поля: response_id (→ responses.id), rating (like|dislike), comment
- debug_logs: iOS-логи. Поля: message, created_at
- profiles: пустая

ПРАВИЛА:
1. Всегда вызывай query_supabase для получения данных перед ответом
2. Для JOIN feedback↔responses: получи response_id из feedback → запроси responses через or=(id.eq.X,id.eq.Y)
3. Отвечай по-русски, конкретно, с числами из данных
4. Улучшения промпта: показывай конкретно было→стало на основе паттернов дизлайков
5. Планы задач: **P0/P1/P2** — Задача — обоснование из данных
6. Используй заголовки ## и списки для структурирования`;

  let msgs = [...chatHistory];

  for (let iter = 0; iter < 10; iter++) {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system, tools, messages: msgs })
    });
    const data = await r.json();
    if (!r.ok) return `Ошибка API: ${data.error?.message}`;

    msgs.push({ role: 'assistant', content: data.content });

    if (data.stop_reason === 'end_turn') {
      chatHistory = msgs;
      return data.content.find(b => b.type === 'text')?.text || '';
    }

    if (data.stop_reason === 'tool_use') {
      const uses = data.content.filter(b => b.type === 'tool_use');
      const results = [];
      for (const u of uses) {
        if (statusEl) statusEl.innerHTML = mkToolPill(u.input.table, u.input.params);
        const out = await executeTool(u.name, u.input);
        results.push({ type: 'tool_result', tool_use_id: u.id, content: out });
      }
      msgs.push({ role: 'user', content: results });
    }
  }
  return 'Превышен лимит итераций.';
}

function mkToolPill(table, params) {
  const short = (params||'').substring(0, 65);
  return `<div class="tool-pill"><span class="tool-pill-icon">⚙</span> ${table} <code>${short}${params?.length>65?'…':''}</code></div>`;
}

async function sendMessage() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text || isLoading) return;

  inp.value = ''; inp.style.height = 'auto';
  appendUserTurn(text);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;

  const { content, status } = appendAssistantTurn();

  try {
    const answer = await runAgent(text, status);
    status.remove();
    content.innerHTML = renderMd(answer);
  } catch(e) {
    status.remove();
    content.innerHTML = `<span style="color:#E5534B">Ошибка: ${e.message}</span>`;
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  scrollBottom();
}

function renderMd(text) {
  // Process code blocks first
  text = text.replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Headers
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Lists
  text = text.replace(/^[-•*] (.+)$/gm, '<li>$1</li>');
  text = text.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  // Wrap consecutive <li>
  text = text.replace(/(<li>.*?<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Paragraphs
  const paras = text.split(/\n\n+/);
  return paras.map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[123]|ul|pre)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');
}

function scrollBottom() {
  const m = document.getElementById('messages');
  requestAnimationFrame(() => { m.scrollTop = m.scrollHeight; });
}
